name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            PROJECT=ai-fluency-framework-course

            cd /srv/projects/$PROJECT
            git pull origin main

            if [ ! -f /etc/nginx/conf.d/projects/$PROJECT.conf ]; then
              sudo tee /etc/nginx/conf.d/projects/$PROJECT.conf > /dev/null << 'NGINX'
            location /ai-fluency-framework-course/ {
                alias /srv/projects/ai-fluency-framework-course/;
                index index.html;
                try_files $uri $uri/ =404;
            }
            NGINX
              sudo nginx -t && sudo systemctl reload nginx
            fi
